<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Van con faros">
  <defs>
    <radialGradient id="vglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7ECFD4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2D4A3E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hbeam" cx="0%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="#1A1410" stroke="#D4A843" stroke-width="1"/>
  <circle cx="50" cy="50" r="48" fill="url(#vglow)"/>
  <!-- Stars -->
  <g fill="#F5EDD8">
    <circle cx="20" cy="22" r="0.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="75" cy="18" r="0.5"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="82" cy="32" r="0.7"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.1s" repeatCount="indefinite"/></circle>
  </g>
  <!-- Mountain horizon -->
  <path d="M0 72 L14 60 L26 68 L42 56 L58 66 L74 58 L88 66 L100 60 L100 100 L0 100 Z" fill="#2D4A3E" opacity="0.7"/>
  <!-- Ground -->
  <rect y="85" width="100" height="15" fill="#1A1410"/>
  <!-- Headlight beam -->
  <path d="M82 76 L100 66 L100 86 L82 80 Z" fill="url(#hbeam)">
    <animate attributeName="opacity" values="0.3;0.95;0.3;0.7" dur="2.8s" repeatCount="indefinite"/>
  </path>
  <!-- Van -->
  <g transform="translate(38 64)">
    <rect x="0" y="0" width="44" height="16" rx="2" fill="#F5EDD8" stroke="#D4A843" stroke-width="0.6"/>
    <rect x="28" y="-8" width="14" height="8" rx="1.5" fill="#F5EDD8" stroke="#D4A843" stroke-width="0.6"/>
    <!-- Windows -->
    <rect x="30" y="-6" width="10" height="5" rx="0.5" fill="#7ECFD4">
      <animate attributeName="fill" values="#7ECFD4;#D4A843;#7ECFD4" dur="3.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="4" y="3" width="10" height="6" rx="0.5" fill="#7ECFD4">
      <animate attributeName="fill" values="#7ECFD4;#F5EDD8;#7ECFD4" dur="4.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="16" y="3" width="10" height="6" rx="0.5" fill="#7ECFD4">
      <animate attributeName="fill" values="#7ECFD4;#D4A843;#7ECFD4" dur="3.7s" repeatCount="indefinite"/>
    </rect>
    <!-- Wheels -->
    <circle cx="9" cy="17" r="3" fill="#1A1410" stroke="#F5EDD8" stroke-width="0.4"/>
    <circle cx="35" cy="17" r="3" fill="#1A1410" stroke="#F5EDD8" stroke-width="0.4"/>
    <!-- Headlight bulb -->
    <circle cx="44" cy="8" r="1.2" fill="#D4A843">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
