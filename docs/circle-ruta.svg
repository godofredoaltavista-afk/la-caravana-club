<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Ruta serpenteante">
  <defs>
    <radialGradient id="rglow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1A1410" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="#F5EDD8" stroke="#8B1A2A" stroke-width="1"/>
  <circle cx="50" cy="50" r="48" fill="url(#rglow)"/>
  <!-- Topographic rings -->
  <g fill="none" stroke="#8B1A2A" opacity="0.18">
    <circle cx="30" cy="30" r="10"/>
    <circle cx="30" cy="30" r="16"/>
    <circle cx="30" cy="30" r="22"/>
    <circle cx="72" cy="68" r="8"/>
    <circle cx="72" cy="68" r="14"/>
  </g>
  <!-- Cross compass -->
  <g stroke="#8B1A2A" opacity="0.3" stroke-width="0.4">
    <line x1="50" y1="14" x2="50" y2="86"/>
    <line x1="14" y1="50" x2="86" y2="50"/>
  </g>
  <text x="50" y="13" font-family="'Courier New',monospace" font-size="5" fill="#8B1A2A" text-anchor="middle" opacity="0.7">N</text>
  <!-- Route path -->
  <path id="rpath" d="M14 80 Q28 72 36 60 T54 38 Q66 28 80 22"
        fill="none" stroke="#8B1A2A" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="3.4s" repeatCount="indefinite"/>
  </path>
  <!-- Route start/end markers -->
  <circle cx="14" cy="80" r="2.5" fill="#8B1A2A"/>
  <circle cx="14" cy="80" r="1" fill="#F5EDD8"/>
  <circle cx="80" cy="22" r="2.5" fill="#D4A843"/>
  <circle cx="80" cy="22" r="1" fill="#1A1410"/>
  <!-- Moving van marker -->
  <g>
    <rect x="-3" y="-2" width="6" height="3.5" rx="0.5" fill="#1A1410">
      <animateMotion dur="6s" repeatCount="indefinite" rotate="auto">
        <mpath href="#rpath"/>
      </animateMotion>
    </rect>
  </g>
  <!-- Coordinate label -->
  <text x="50" y="95" font-family="'Courier New',monospace" font-size="4.5" fill="#8B1A2A" text-anchor="middle" opacity="0.7">-31.42°S · -64.18°W</text>
</svg>
