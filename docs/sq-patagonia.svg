<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Patagonia">
  <defs>
    <linearGradient id="pSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D4A3E"/>
      <stop offset="60%" stop-color="#7ECFD4"/>
      <stop offset="100%" stop-color="#F5EDD8"/>
    </linearGradient>
    <filter id="pInk"><feTurbulence baseFrequency="0.02" numOctaves="2" seed="2"/><feDisplacementMap in="SourceGraphic" scale="3"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#pSky)"/>
  <!-- Snow peaks back -->
  <path d="M0 220 L60 100 L120 180 L180 60 L240 160 L300 80 L360 170 L400 130 L400 400 L0 400 Z" fill="#F5EDD8" opacity="0.95" filter="url(#pInk)"/>
  <!-- Snow tips white -->
  <path d="M170 80 L180 60 L195 90 Z M290 100 L300 80 L315 110 Z" fill="#FFFFFF" opacity="0.85"/>
  <!-- Mid mountains -->
  <path d="M0 280 L80 200 L160 260 L240 190 L320 270 L400 220 L400 400 L0 400 Z" fill="#2D4A3E" opacity="0.85" filter="url(#pInk)"/>
  <!-- Lake -->
  <ellipse cx="200" cy="340" rx="200" ry="35" fill="#7ECFD4" opacity="0.7"/>
  <!-- Lake reflection -->
  <path d="M120 320 L200 305 L280 320 L240 340 L160 340 Z" fill="#F5EDD8" opacity="0.25"/>
  <!-- Front pines -->
  <g fill="#1A1410">
    <path d="M30 360 L24 340 L28 340 L22 320 L26 320 L20 300 L40 300 L34 320 L38 320 L32 340 L36 340 L30 360 Z"/>
    <path d="M60 365 L55 348 L58 348 L53 332 L57 332 L60 318 L63 332 L67 332 L62 348 L65 348 L60 365 Z"/>
    <path d="M370 360 L365 342 L368 342 L363 326 L367 326 L370 310 L373 326 L377 326 L372 342 L375 342 L370 360 Z"/>
  </g>
  <!-- Sun -->
  <circle cx="320" cy="100" r="22" fill="#D4A843" opacity="0.85">
    <animate attributeName="opacity" values="0.7;0.95;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Label -->
  <g font-family="Georgia,serif">
    <rect x="20" y="20" width="160" height="38" fill="#1A1410" opacity="0.7"/>
    <text x="30" y="38" font-size="11" fill="#D4A843" letter-spacing="3" font-family="'Courier New',monospace">— RUTA 40 —</text>
    <text x="30" y="52" font-size="14" fill="#F5EDD8" letter-spacing="2">PATAGONIA</text>
  </g>
  <!-- Frame -->
  <rect x="4" y="4" width="392" height="392" fill="none" stroke="#1A1410" stroke-width="2"/>
  <rect x="10" y="10" width="380" height="380" fill="none" stroke="#D4A843" stroke-width="0.6" opacity="0.5"/>
</svg>
