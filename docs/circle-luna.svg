<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Luna y estrellas">
  <defs>
    <radialGradient id="lglow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F5EDD8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1A1410" stop-opacity="0"/>
    </radialGradient>
    <mask id="moonmask">
      <rect width="100" height="100" fill="white"/>
      <circle cx="56" cy="36" r="14" fill="black"/>
    </mask>
  </defs>
  <circle cx="50" cy="50" r="48" fill="#1A1410" stroke="#D4A843" stroke-width="1"/>
  <circle cx="50" cy="50" r="48" fill="url(#lglow)"/>
  <!-- Crescent moon -->
  <g>
    <circle cx="48" cy="36" r="14" fill="#F5EDD8" mask="url(#moonmask)"/>
    <circle cx="48" cy="36" r="14" fill="none" stroke="#D4A843" stroke-width="0.3" opacity="0.5"/>
  </g>
  <!-- Stars varied -->
  <g fill="#F5EDD8">
    <circle cx="14" cy="20" r="0.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="26" cy="14" r="0.6"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="78" cy="14" r="1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="88" cy="28" r="0.7"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="20" cy="48" r="0.9"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="58" r="0.8"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="14" cy="68" r="0.6"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <!-- 4-point star -->
    <g transform="translate(70 70)">
      <path d="M0 -3 L0.6 -0.6 L3 0 L0.6 0.6 L0 3 L-0.6 0.6 L-3 0 L-0.6 -0.6 Z" fill="#D4A843">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="22s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  <!-- Horizon mountains -->
  <path d="M0 84 L18 72 L34 80 L52 68 L70 78 L86 70 L100 78 L100 100 L0 100 Z" fill="#2D4A3E" opacity="0.85"/>
</svg>
